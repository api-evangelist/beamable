apis:
  - aid: beamable:player-accounts
    name: Beamable Player Accounts API
    description: >
      REST API for player identity, authentication, and account management.
      Supports frictionless guest login, username/password registration, and
      third-party OAuth providers including Facebook, Google, Apple, and Steam.
      Enables multiple local player contexts and token-based session management
      for both client and server-side integrations.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.beamable.com/docs/beamable-overview
    baseURL: https://api.beamable.com
    tags:
      - Player Accounts
      - Authentication
      - Identity
    properties:
      - type: Documentation
        url: https://docs.beamable.com/docs/beamable-overview
  - aid: beamable:game-economy
    name: Beamable Game Economy API
    description: >
      REST API for virtual currency, inventory, and in-game store management.
      Provides endpoints for granting, spending, and querying player currencies,
      managing item inventories, configuring store catalogs, and handling real-
      money purchase workflows with custom reporting. Integrates with the
      LiveOps portal for non-engineer management of economy content.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.beamable.com/docs/beamable-overview
    baseURL: https://api.beamable.com
    tags:
      - Virtual Currency
      - Inventory
      - Game Economy
      - In-App Purchases
    properties:
      - type: Documentation
        url: https://docs.beamable.com/docs/beamable-overview
  - aid: beamable:leaderboards
    name: Beamable Leaderboards API
    description: >
      REST API for creating and querying competitive leaderboards across player
      populations. Supports global, friend-based, and partitioned leaderboards
      with configurable scoring, time windows, and reset schedules. Integrates
      with the LiveOps portal for managing leaderboard definitions and viewing
      rankings without code changes.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.beamable.com/docs/beamable-overview
    baseURL: https://api.beamable.com
    tags:
      - Leaderboards
      - Social
      - Competitive
    properties:
      - type: Documentation
        url: https://docs.beamable.com/docs/beamable-overview
  - aid: beamable:live-events
    name: Beamable Live Events API
    description: >
      REST API for scheduling and managing time-limited live events, in-game
      announcements, player mail, and push notifications. Enables game studios
      to run seasonal content, limited-time offers, and player engagement
      campaigns from the LiveOps portal or programmatically via REST endpoints.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.beamable.com/docs/beamable-overview
    baseURL: https://api.beamable.com
    tags:
      - Live Events
      - Notifications
      - LiveOps
    properties:
      - type: Documentation
        url: https://docs.beamable.com/docs/beamable-overview
  - aid: beamable:microservices
    name: Beamable Microservices API
    description: >
      Framework and REST API for deploying custom C# server-side logic as
      managed microservices on the Beamable platform. Supports scheduled jobs,
      event-driven handlers, inter-service communication, and autogenerated
      client stubs for Unity and Unreal. Integrates with Beamable data storage
      and player context without requiring developers to manage containers or
      cloud infrastructure directly.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.beamable.com/docs/beamable-overview
    baseURL: https://api.beamable.com
    tags:
      - Microservices
      - Cloud Functions
      - Custom Backend
    properties:
      - type: Documentation
        url: https://docs.beamable.com/docs/beamable-overview
