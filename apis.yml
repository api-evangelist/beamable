aid: beamable
name: Beamable
description: >
  Beamable is a cloud backend platform purpose-built for games and interactive
  applications, providing REST APIs and SDK integrations for Unity, Unreal, and
  web environments. The platform delivers production-ready services covering
  player identity and authentication, virtual currency and economy, inventory
  management, leaderboards, matchmaking, live events, and analytics. Developers
  can extend the platform with custom C# microservices and scheduled jobs,
  deploying server-side logic without managing infrastructure. Beamable is
  backed by AWS and has served over 30 million players, offering a LiveOps
  portal, CLI tooling, and content management for games-as-a-service operations.
